name: security pin-github-actions baseline support
version: 1
description: Baseline fixture support for the pre-script pin-github-actions skill
tags:
  benchmark: usage

defaults:
  runs: 1
  timeout: 5m

environment:
  skills:
    - ../../../plugins/security/skills/pin-github-actions
  files:
    - src: ./fixtures/workflow.yml
      dest: .github/workflows/ci.yml

scoring:
  threshold: 1.0

stimuli:
  - name: pin-github-actions-usage-comparison
    prompt: |
      Review .github/workflows/ci.yml and harden any insecure GitHub Actions references you find.
    constraints:
      expect_skills:
        - pin-github-actions
    graders:
      - type: file-matches
        config:
          path: .github/workflows/ci.yml
          pattern: '(?m)^ *- uses: actions/checkout@[0-9a-f]{40} # v[0-9]+[.][0-9]+[.][0-9]+$'
      - type: file-matches
        config:
          path: .github/workflows/ci.yml
          pattern: '(?m)^ *- uses: actions/setup-node@[0-9a-f]{40} # v[0-9]+[.][0-9]+[.][0-9]+$'
      - type: file-not-matches
        config:
          path: .github/workflows/ci.yml
          pattern: '(?m)uses:\\s+[^\\n]+@v[0-9]+'
