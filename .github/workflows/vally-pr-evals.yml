name: Vally PR Evals

on:
  pull_request:

jobs:
  run-evals:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@692973e3d937129bcbf40652eb9f2f61becf3332 # v4.2.2
      - uses: actions/setup-node@49933ea5288caeca8642e84d8d5f7a3f7c7bd7e8 # v4.4.0
        with:
          node-version: 22

      - name: Lint eval specs
        run: npx -y @microsoft/vally-cli@0.6.0 lint --eval-spec evals

      - name: Run evals
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: npx -y @microsoft/vally-cli@0.6.0 eval --suite pr --output-dir vally-results --junit

      - name: Upload eval results
        if: always()
        uses: actions/upload-artifact@65462800fd760344b1a7b4382951275a0abb4808 # v4.3.3
        with:
          name: vally-results
          path: vally-results
